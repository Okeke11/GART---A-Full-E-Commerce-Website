<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Gart</title>
    <link rel="icon" type="image/png" href="images/gart-logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --bg-color: #f4f6f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* The Back Button */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--secondary-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            color: var(--primary-color);
        }

        .contact-container {
            background: white;
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
        }

        /* Left Side: Info */
        .contact-info {
            background: var(--primary-color);
            color: white;
            flex: 1;
            padding: 40px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-header h2 { font-size: 2rem; margin-bottom: 10px; }
        .info-header p { opacity: 0.9; line-height: 1.5; }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .social-icons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .social-icons a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: background 0.3s;
        }

        .social-icons a:hover { background: white; color: var(--primary-color); }

        /* Right Side: Form */
        .contact-form {
            flex: 1.5;
            padding: 40px;
            min-width: 350px;
        }

        .form-group { margin-bottom: 20px; }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 0.9rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary-color);
        }

        .submit-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s;
            width: 100%;
        }

        .submit-btn:hover { background: #34495e; }

        @media (max-width: 768px) {
            .back-btn { top: 15px; left: 15px; font-size: 0.9rem; }
            .contact-container { flex-direction: column; margin-top: 60px; }
        }
    </style>
</head>
<body>

    <a href="home.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="contact-container">
        <div class="contact-info">
            <div class="info-header">
                <h2>Get in Touch</h2>
                <p>Have questions about selling or buying? We're here to help you get started.</p>
            </div>
            
            <div class="info-details">
                <div class="info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <span>support@gart.io</span>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <span>+234 800 GART HELP</span>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>123 Innovation Drive, Lagos</span>
                </div>
            </div>

            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            </div>
        </div>

        <div class="contact-form">
            <form>
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Okeke Chiagozie" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" placeholder="I need help with..." required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="4" placeholder="Type your message here..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

</body>
</html>
