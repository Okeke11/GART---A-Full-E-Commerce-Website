<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Gart</title>
    <link rel="icon" type="image/png" href="images/gart-logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CHECKOUT SPECIFIC STYLES */
        .checkout-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 40px;
        }

        /* Left: Form Section */
        .checkout-form-section {
            flex: 2;
        }

        .section-header {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
            font-weight: 700;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #3498db;
        }

        /* Payment Methods */
        .payment-options {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .payment-card {
            flex: 1;
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .payment-card:hover {
            border-color: #bdc3c7;
            background: #f9f9f9;
        }

        .payment-card.active {
            border-color: #3498db;
            background: #eaf6fc;
            color: #2980b9;
        }

        .payment-card i {
            font-size: 1.5rem;
            margin-bottom: 5px;
            display: block;
        }

        /* Card Details (Hidden by default) */
        #card-details-section {
            display: none;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #eee;
        }

        /* Right: Order Summary */
        .checkout-summary {
            flex: 1;
            background: #f9f9f9;
            padding: 25px;
            border-radius: 10px;
            height: fit-content;
            border: 1px solid #eee;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: #555;
        }

        .total-row {
            border-top: 2px solid #ddd;
            padding-top: 15px;
            margin-top: 10px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #2c3e50;
        }

        .pay-btn {
            width: 100%;
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .pay-btn:hover { background-color: #219150; }

        @media (max-width: 800px) {
            .checkout-wrapper { flex-direction: column-reverse; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="home.html">
                <img src="images/gart-logo.png" alt="Gart Logo" style="height: 40px; margin-left: 15px; border-radius: 50%;">
            </a>
            <h2 style="margin-left: 20px; color: #555;">Secure Checkout</h2>
        </div>
        <div class="nav-right">
            <a href="cart.html" style="text-decoration: none; color: #555;">
                <i class="fa-solid fa-arrow-left"></i> Back to Cart
            </a>
        </div>
    </nav>

    <div class="checkout-wrapper">
        
        <div class="checkout-form-section">
            <form id="checkoutForm">
                
                <div class="section-header">1. Delivery Information</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="08012345678" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Delivery Address</label>
                    <input type="text" placeholder="Street Address, Apartment, etc." required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>State</label>
                        <select required>
                            <option value="">Select State</option>
                            <option value="Lagos">Lagos</option>
                            <option value="Abuja">Abuja</option>
                            <option value="Rivers">Rivers</option>
                            <option value="Ogun">Ogun</option>
                            <option value="Kano">Kano</option>
                            </select>
                    </div>
                    <div class="form-group">
                        <label>City / Town</label>
                        <input type="text" placeholder="e.g. Ikeja" required>
                    </div>
                </div>

                <div class="section-header" style="margin-top: 40px;">2. Payment Method</div>
                
                <div class="payment-options">
                    <div class="payment-card" id="opt-transfer">
                        <i class="fa-solid fa-money-bill-transfer"></i>
                        Bank Transfer
                    </div>
                    
                    <div class="payment-card" id="opt-card">
                        <i class="fa-regular fa-credit-card"></i>
                        Pay with Card
                    </div>
                </div>

                <div id="card-details-section">
                    <h4 style="margin-bottom: 15px; color:#333;">Enter Card Details</h4>
                    
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label>Card Type</label>
                        <select id="cardType">
                            <option value="">Select Card Type</option>
                            <option value="verve">Verve</option>
                            <option value="mastercard">Mastercard</option>
                            <option value="visa">Visa</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 15px;">
                        <label>Card Number</label>
                        <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" id="cardNum">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="password" placeholder="123" maxlength="3">
                        </div>
                    </div>
                </div>

                <button type="submit" class="pay-btn" id="payBtn">Pay Now</button>
            </form>
        </div>

        <div class="checkout-summary">
            <div class="section-header" style="border:none; font-size:1.1rem; margin-bottom:10px;">Order Summary</div>
            
            <div class="summary-row">
                <span>Items Total</span>
                <span id="summary-subtotal">₦ 0</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee</span>
                <span style="color: #27ae60;">Free</span>
            </div>
            <div class="summary-row total">
                <span>Total to Pay</span>
                <span id="summary-total">₦ 0</span>
            </div>

            <div style="margin-top: 20px; font-size: 0.8rem; color: #777; text-align: center;">
                <i class="fa-solid fa-lock"></i> Payments are secured and encrypted.
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCheckoutTotals();
            setupPaymentLogic();
        });

        // 1. Load Total Price from Cart Logic
        function loadCheckoutTotals() {
            const email = localStorage.getItem('userEmail');
            if(!email) return window.location.href = 'login.html';

            const cartKey = `cart_${email}`;
            const cart = JSON.parse(localStorage.getItem(cartKey)) || [];

            let total = 0;
            cart.forEach(item => total += Number(item.price));

            const formatted = "₦ " + total.toLocaleString();
            document.getElementById('summary-subtotal').innerText = formatted;
            document.getElementById('summary-total').innerText = formatted;
            document.getElementById('payBtn').innerText = `Pay ${formatted}`;
        }

        // 2. Handle Payment Selection Logic
        function setupPaymentLogic() {
            const transferBtn = document.getElementById('opt-transfer');
            const cardBtn = document.getElementById('opt-card');
            const cardSection = document.getElementById('card-details-section');
            const payBtn = document.getElementById('payBtn');
            const cardInputs = cardSection.querySelectorAll('input, select');

            let selectedMethod = '';

            // A. TRANSFER CLICK
            transferBtn.addEventListener('click', () => {
                alert("Bank Transfer is not available right now. Please use Card.");
                // Reset UI
                transferBtn.classList.remove('active');
                cardBtn.classList.remove('active');
                cardSection.style.display = 'none';
                selectedMethod = '';
            });

            // B. CARD CLICK
            cardBtn.addEventListener('click', () => {
                transferBtn.classList.remove('active');
                cardBtn.classList.add('active');
                cardSection.style.display = 'block'; // Show inputs
                selectedMethod = 'card';
                
                // Scroll slightly to show the new fields
                cardSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });

            // C. HANDLE FORM SUBMIT
            document.getElementById('checkoutForm').addEventListener('submit', (e) => {
                e.preventDefault();

                if (selectedMethod !== 'card') {
                    alert("Please select a valid payment method (Card).");
                    return;
                }

                // Simple validation for card type
                const cardType = document.getElementById('cardType').value;
                if(!cardType) {
                    alert("Please select your Card Type (Verve, Visa, etc).");
                    return;
                }

                // Simulate Processing
                payBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing Payment...';
                payBtn.disabled = true;

                setTimeout(() => {
                    alert("Payment Successful! Your order has been placed.");
                    
                    // Clear Cart
                    const email = localStorage.getItem('userEmail');
                    const cartKey = `cart_${email}`;
                    localStorage.removeItem(cartKey);

                    // Redirect Home
                    window.location.href = 'home.html';
                }, 2000);
            });
        }
    </script>
</body>
</html>
