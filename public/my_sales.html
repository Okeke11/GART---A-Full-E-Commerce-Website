<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sales - Gart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        .sales-grid { display: grid; gap: 20px; }
        
        .order-card {
            background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .order-info h3 { margin: 0 0 5px 0; color: #2c3e50; }
        .order-info p { margin: 2px 0; color: #7f8c8d; font-size: 0.9rem; }
        .status-badge {
            background: #f1c40f; color: #fff; padding: 4px 10px; border-radius: 15px; font-size: 0.8rem;
        }

        .action-area { text-align: right; }
        
        .verify-btn {
            background: #27ae60; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .verify-btn:hover { background: #219150; }

        /* Modal for Inputting Code */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center;
        }
        .code-input {
            font-size: 2rem; letter-spacing: 5px; width: 100%; padding: 10px;
            text-align: center; margin: 20px 0; border: 2px solid #ddd; border-radius: 5px;
        }
        .mybutton{
            padding: 8px;
            border-radius: 7px;
            outline: none;
            border: none;
            background-color: #7f8c8d;
            font-weight: bold;
        }
        .mybutton:hover{
            padding: 12px;
            transition: 0.2s;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="home.html"><img src="images/gart-logo.png" style="height:40px; margin-left:15px; border-radius:50%;"></a>
            <h2 style="margin-left: 20px; color: #555;">Incoming Orders</h2>
        </div>
        <div class="nav-right">
            <div class="icon-container">
                <a href="my_products.html" style="color: inherit;"><button class="mybutton">My Products</button></a>
            </div>
            <a href="tosell.html" style="text-decoration: none; color: #555;">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div id="sales-list" class="sales-grid">
            <p style="text-align:center;">Loading orders...</p>
        </div>
    </div>

    <div id="verifyModal" class="modal">
        <div class="modal-content">
            <h3>Enter Buyer's Code</h3>
            <p>Enter the 4-digit code provided by the buyer/rider.</p>
            <input type="text" id="code-input" class="code-input" maxlength="4" placeholder="0000">
            <button class="verify-btn" id="submit-verify-btn" style="width:100%;">Confirm Delivery</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#777; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        let currentOrderId = null;
        let userEmail = localStorage.getItem('userEmail');

        document.addEventListener('DOMContentLoaded', loadSales);

        async function loadSales() {
            if(!userEmail) return window.location.href = 'login.html';

            try {
                // Fetch orders where I am the seller
                const response = await fetch(`/api/my-sales?email=${userEmail}`);
                const data = await response.json();

                const container = document.getElementById('sales-list');
                container.innerHTML = '';

                if(data.orders.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#999;">No active orders.</p>';
                    return;
                }

                data.orders.forEach(order => {
                    const date = new Date(order.createdAt).toLocaleDateString();
                    
                    const div = document.createElement('div');
                    div.className = 'order-card';
                    div.innerHTML = `
                        <div class="order-info">
                            <h3>Order #${order._id.slice(-6).toUpperCase()}</h3>
                            <p><strong>Item:</strong> ${order.items[0].title} ${order.items.length > 1 ? `(+${order.items.length-1} others)` : ''}</p>
                            <p><strong>Buyer:</strong> ${order.buyerEmail}</p>
                            <p><strong>Date:</strong> ${date}</p>
                            ${order.status === 'Completed' ? '<span class="status-badge" style="background:#27ae60;">Completed</span>' : '<span class="status-badge">Pending Delivery</span>'}
                        </div>
                        <div class="action-area">
                            <div style="font-size:1.2rem; font-weight:bold; color:#3498db; margin-bottom:10px;">₦ ${order.totalAmount.toLocaleString()}</div>
                            ${order.status !== 'Completed' ? 
                                `<button class="verify-btn" onclick="openModal('${order._id}')">Verify Delivery</button>` : 
                                '<button disabled style="opacity:0.5; cursor:not-allowed;">Funds Released</button>'}
                        </div>
                    `;
                    container.appendChild(div);
                });

            } catch(e) { console.error(e); }
        }

        function openModal(orderId) {
            currentOrderId = orderId;
            document.getElementById('verifyModal').style.display = 'flex';
            document.getElementById('code-input').value = '';
            document.getElementById('code-input').focus();
        }

        function closeModal() {
            document.getElementById('verifyModal').style.display = 'none';
        }

        document.getElementById('submit-verify-btn').addEventListener('click', async () => {
            const code = document.getElementById('code-input').value;
            if(code.length < 4) return alert("Enter 4 digits");

            const btn = document.getElementById('submit-verify-btn');
            btn.innerHTML = 'Verifying...';

            try {
                const response = await fetch('/api/verify-delivery', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        sellerEmail: userEmail,
                        orderId: currentOrderId,
                        inputCode: code
                    })
                });
                const data = await response.json();

                if(data.success) {
                    alert(data.message);
                    closeModal();
                    loadSales(); // Refresh list
                } else {
                    alert(data.message);
                }
            } catch(e) { alert("Server Error"); }
            
            btn.innerHTML = 'Confirm Delivery';
        });
    </script>
</body>
</html>
