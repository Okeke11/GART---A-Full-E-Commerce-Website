<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - Gart</title>
    <link rel="icon" type="image/png" href="images/gart-logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .my-products-wrapper {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .header-section h1 { color: #2c3e50; }

        .add-new-btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Product Card Styles (Reused) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .card-image {
            height: 200px;
            width: 100%;
            object-fit: contain;
            background: #f9f9f9;
        }

        .card-info { padding: 15px; }
        
        /* Delete Button specific for this page */
        .delete-btn {
            width: 100%;
            padding: 10px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        .delete-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="home.html">
                <img src="images/gart-logo.png" alt="Gart Logo" style="height: 40px; margin-left: 15px; border-radius: 50%;">
            </a>
        </div>
        <div class="nav-right">
            <a href="home.html" style="text-decoration: none; color: #555; margin-right: 20px;">Back to Shop</a>
        </div>
    </nav>

    <div class="my-products-wrapper">
        <div class="header-section">
            <h1>My Active Listings</h1>
            <a href="sell.html" class="add-new-btn"><i class="fa-solid fa-plus"></i> Add New Product</a>
        </div>

        <div class="product-grid" id="myProductGrid">
            <p>Loading your products...</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadMyProducts);

        async function loadMyProducts() {
            const email = localStorage.getItem('userEmail');
            const grid = document.getElementById('myProductGrid');

            if (!email) {
                grid.innerHTML = '<p>Please log in to see your products.</p>';
                return;
            }

            try {
                const response = await fetch(`/api/my-products?email=${email}`);
                const data = await response.json();

                if (data.success) {
                    if (data.products.length === 0) {
                        grid.innerHTML = '<p>You haven\'t listed any items yet.</p>';
                        return;
                    }

                    grid.innerHTML = ''; // Clear loading text
                    
                    data.products.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        
                        // Use first image or placeholder
                        const imgUrl = product.images.length > 0 ? `/uploads/${product.images[0]}` : 'https://via.placeholder.com/250';

                        card.innerHTML = `
                            <img src="${imgUrl}" class="card-image">
                            <div class="card-info">
                                <h3>${product.title}</h3>
                                <div style="color:#3498db; font-weight:bold;">₦ ${parseInt(product.price).toLocaleString()}</div>
                                <div style="font-size:0.8rem; color:#777; margin:5px 0;">Views: 0</div>
                                
                                <button class="delete-btn" onclick="deleteProduct('${product._id}')">
                                    <i class="fa-solid fa-trash"></i> Delete Listing
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (error) {
                console.error(error);
                grid.innerHTML = '<p>Error loading products.</p>';
            }
        }

        async function deleteProduct(id) {
            if(!confirm("Are you sure you want to delete this listing?")) return;

            try {
                const response = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                const data = await response.json();
                if(data.success) {
                    alert("Product deleted!");
                    loadMyProducts(); // Reload the list
                }
            } catch(e) {
                alert("Could not delete product.");
            }
        }
    </script>
</body>
</html>
