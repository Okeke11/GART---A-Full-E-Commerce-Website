<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Phone - Gart</title>
    <link rel="icon" type="image/png" href="images/gart-logo.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .verify-wrapper {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f6f8;
            padding: 20px;
        }

        .verify-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .verify-icon {
            width: 80px;
            height: 80px;
            background-color: #e8f4fc;
            color: #3498db;
            font-size: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .verify-card h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .verify-card p {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Form Elements */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 0.9rem;
        }

        .phone-input-container {
            display: flex;
            border: 2px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .phone-input-container:focus-within {
            border-color: #3498db;
        }

        .country-code {
            background: #f8f9fa;
            padding: 12px 15px;
            color: #555;
            font-weight: 600;
            border-right: 1px solid #eee;
        }

        .phone-input-container input {
            flex: 1;
            border: none;
            padding: 12px;
            font-size: 1rem;
            outline: none;
        }

        /* OTP Input (Hidden initially) */
        .otp-section {
            display: none; /* Hidden by default */
            margin-top: 20px;
            animation: fadeIn 0.5s;
        }

        .otp-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-align: center;
            border: 2px solid #eee;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }

        .otp-input:focus {
            border-color: #3498db;
        }

        .action-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .action-btn:hover {
            background-color: #2980b9;
        }

        .action-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .resend-link {
            display: block;
            margin-top: 15px;
            color: #3498db;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
        }

        .resend-link:hover { text-decoration: underline; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="home.html">
                <img src="images/gart-logo.png" alt="Gart Logo" style="height: 40px; margin-left: 15px; border-radius: 50%;">
            </a>
        </div>
        <div class="nav-right" style="padding-right: 20px;">
            <a href="tosell.html" style="text-decoration: none; color: #7f8c8d; font-weight: 600;">Cancel</a>
        </div>
    </nav>

    <div class="verify-wrapper">
        <div class="verify-card">
            <div class="verify-icon">
                <i class="fa-solid fa-mobile-screen-button"></i>
            </div>
            
            <h2>Verify Phone Number</h2>
            <p>To ensure trust on Gart, all sellers must verify their phone number before listing items.</p>

            <form id="verifyForm">
                
                <div class="input-group">
                    <label>Enter Mobile Number</label>
                    <div class="phone-input-container">
                        <span class="country-code">+234</span>
                        <input type="tel" id="phoneNumber" placeholder="801 234 5678" maxlength="11" required>
                    </div>
                </div>

                <button type="button" id="getOtpBtn" class="action-btn">Get Verification Code</button>

                <div class="otp-section" id="otpSection">
                    <label style="display:block; text-align:left; font-weight:600; color:#34495e; margin-bottom:8px;">Enter 4-Digit Code</label>
                    <input type="text" id="otpInput" class="otp-input" placeholder="0 0 0 0" maxlength="4">
                    
                    <button type="submit" id="verifyBtn" class="action-btn">Verify & Continue</button>
                    
                    <a class="resend-link" onclick="alert('Code resent to your phone!')">Resend Code</a>
                </div>

            </form>
        </div>
    </div>

<script>
    const getOtpBtn = document.getElementById('getOtpBtn');
    const otpSection = document.getElementById('otpSection');
    const phoneInput = document.getElementById('phoneNumber');
    const otpInput = document.getElementById('otpInput');
    const verifyForm = document.getElementById('verifyForm');

    // Helper to get full number (+234...)
    function getFullPhone() {
        // Removes leading '0' if user typed "080..." to avoid "+234080..."
        let number = phoneInput.value;
        if (number.startsWith('0')) {
            number = number.substring(1);
        }
        return "+234" + number;
    }

    // 1. SEND OTP (Now Checks Profile)
    getOtpBtn.addEventListener('click', async function() {
        const userEmail = localStorage.getItem('userEmail');

        if (!userEmail) {
            alert("Please log in first.");
            window.location.href = 'login.html';
            return;
        }

        if (phoneInput.value.length < 10) {
            alert("Please enter a valid phone number.");
            return;
        }

        // UI Feedback
        getOtpBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Checking Profile...';
        getOtpBtn.disabled = true;

        try {
            const response = await fetch('/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    phone: getFullPhone(),
                    email: userEmail // Sending email so server knows who to check
                })
            });
            
            const data = await response.json();

            if (data.success) {
                // Success
                getOtpBtn.style.display = 'none';
                otpSection.style.display = 'block';
                otpInput.focus();
                alert("Match found! Code sent.");
            } else {
                // Handle Errors
                getOtpBtn.disabled = false;
                getOtpBtn.innerHTML = "Get Verification Code";

                if (data.errorType === 'missing_profile') {
                    // Logic: Redirect if profile is empty
                    if(confirm("You have not set a phone number in your profile yet. Go to Profile now?")) {
                        window.location.href = 'profile.html';
                    }
                } else {
                    // Logic: Mismatch or other error
                    alert(data.message);
                }
            }
        } catch (err) {
            console.error(err);
            alert("Server connection failed.");
            getOtpBtn.disabled = false;
            getOtpBtn.innerHTML = "Get Verification Code";
        }
    });

    // 2. VERIFY OTP (Unchanged logic)
    verifyForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const enteredOTP = otpInput.value;
        const verifyBtn = document.getElementById('verifyBtn');

        verifyBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';

        try {
            const response = await fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    phone: getFullPhone(), 
                    code: enteredOTP 
                })
            });

            const data = await response.json();

            if (data.success) {
                verifyBtn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Verified!';
                verifyBtn.style.backgroundColor = '#27ae60';
                setTimeout(() => { window.location.href = 'sell.html'; }, 1000);
            } else {
                alert("Incorrect Code.");
                verifyBtn.innerHTML = "Verify & Continue";
                otpInput.value = '';
            }
        } catch (err) {
            console.error(err);
            alert("Verification failed.");
        }
    });
</script>
</body>
</html>
