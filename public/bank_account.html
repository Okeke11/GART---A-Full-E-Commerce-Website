<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bank Accounts - Gart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bank-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        
        .bank-card {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .bank-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
        .account-number { font-size: 1.8rem; letter-spacing: 3px; margin: 15px 0; font-family: monospace; }
        .account-holder { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

        .card-actions {
            position: absolute; 
            top: 20px; 
            right: 20px;
            z-index: 100; /* Forces button above everything else */
        }
        
        .action-btn {
            background: rgba(255,255,255,0.2); 
            border: none; 
            color: white;
            width: 40px; /* Bigger size */
            height: 40px; /* Bigger size */
            border-radius: 50%; 
            cursor: pointer;
            margin-left: 5px; 
            transition: all 0.2s;
            
            /* Center the icon perfectly */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .action-btn:hover { 
            background: #e74c3c; /* Turns Red */
            transform: scale(1.1); /* Grows slightly */
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Add Form */
        .add-form {
            background: white; border: 2px dashed #ccc; border-radius: 10px;
            padding: 30px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .add-form:hover { border-color: #3498db; background: #f9f9f9; }
        
        .form-modal {
            display: none; background: white; padding: 20px; border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-top: 20px;
            text-align: left;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;
        }

        .save-btn {
            background: #27ae60; color: white; border: none; padding: 12px 20px;
            border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="home.html"><img src="images/gart-logo.png" style="height:40px; margin-left:15px; border-radius:50%;"></a>
            <h2 style="margin-left: 20px; color: #555;">Bank Details</h2>
        </div>
        <div class="nav-right">
             <a href="tosell.html" style="text-decoration: none; color: #555;"><i class="fa-solid fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <div class="bank-container">
        
        <div id="accounts-list">
            </div>

        <div id="add-btn-container" class="add-form" onclick="toggleForm()">
            <i class="fa-solid fa-plus-circle" style="font-size: 2rem; color: #bdc3c7;"></i>
            <p style="color: #7f8c8d; margin-top: 10px;">Add New Bank Account</p>
        </div>

        <div id="bank-form" class="form-modal">
            <h3 style="margin-bottom: 20px;">Enter Account Details</h3>
            
            <div class="form-group">
                <label>Bank Name</label>
                <select id="bankName">
                    <option value="">Select Bank</option>
                    <option value="GTBank">GTBank</option>
                    <option value="Access Bank">Access Bank</option>
                    <option value="Zenith Bank">Zenith Bank</option>
                    <option value="UBA">UBA</option>
                    <option value="First Bank">First Bank</option>
                    <option value="Kuda">Kuda</option>
                    <option value="OPay">OPay</option>
                </select>
            </div>

            <div class="form-group">
                <label>Account Name</label>
                <input type="text" id="accountName" placeholder="e.g. Okeke Chiagozie">
            </div>

            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="accountNumber" placeholder="0123456789" maxlength="10">
            </div>

            <button class="save-btn" onclick="saveAccount()">Save Account</button>
            <button onclick="toggleForm()" style="width:100%; background:none; border:none; color:#777; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>

    </div>

    <script>
        let myAccounts = [];
        const userEmail = localStorage.getItem('userEmail');

        document.addEventListener('DOMContentLoaded', loadAccounts);

        async function loadAccounts() {
            if(!userEmail) return window.location.href = 'login.html';

            try {
                const response = await fetch(`/get-profile?email=${userEmail}`);
                const data = await response.json();
                
                if(data.success) {
                    myAccounts = data.bankAccounts || [];
                    renderAccounts();
                }
            } catch(e) { console.error(e); }
        }

        function renderAccounts() {
            const list = document.getElementById('accounts-list');
            const addBtn = document.getElementById('add-btn-container');
            const form = document.getElementById('bank-form');
            
            list.innerHTML = '';
            form.style.display = 'none'; // Hide form after render

            myAccounts.forEach((acc, index) => {
                const div = document.createElement('div');
                div.className = 'bank-card';
                div.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn" onclick="deleteAccount(${index})" title="Delete"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="bank-name">${acc.bankName}</div>
                    <div class="account-number">${acc.accountNumber}</div>
                    <div class="account-holder">${acc.accountName}</div>
                `;
                list.appendChild(div);
            });

            // Logic: Max 2 Accounts
            if (myAccounts.length >= 2) {
                addBtn.style.display = 'none';
            } else {
                addBtn.style.display = 'block';
            }
        }

        function toggleForm() {
            const form = document.getElementById('bank-form');
            const btn = document.getElementById('add-btn-container');
            
            if(form.style.display === 'block') {
                form.style.display = 'none';
                if(myAccounts.length < 2) btn.style.display = 'block';
            } else {
                form.style.display = 'block';
                btn.style.display = 'none';
                
                // Clear inputs
                document.getElementById('bankName').value = '';
                document.getElementById('accountName').value = '';
                document.getElementById('accountNumber').value = '';
            }
        }

        async function saveAccount() {
            const bankName = document.getElementById('bankName').value;
            const accName = document.getElementById('accountName').value;
            const accNum = document.getElementById('accountNumber').value;

            if(!bankName || !accName || !accNum) return alert("Please fill all fields");

            // Add new account to array
            myAccounts.push({
                bankName: bankName,
                accountName: accName,
                accountNumber: accNum
            });

            await updateServer();
        }

        async function deleteAccount(index) {
            if(!confirm("Delete this bank account?")) return;
            myAccounts.splice(index, 1);
            await updateServer();
        }

        async function updateServer() {
            try {
                const response = await fetch('/api/update-bank', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: userEmail,
                        bankAccounts: myAccounts
                    })
                });
                const data = await response.json();
                
                if(data.success) {
                    alert("Updated successfully!");
                    renderAccounts();
                } else {
                    alert(data.message);
                    // Revert UI if failed
                    loadAccounts();
                }
            } catch(e) { 
                alert("Server error");
                console.error(e);
            }
        }
    </script>
</body>
</html>
